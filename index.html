<script>
const THEMES = {

  blue:  { '--green':'#0c4a6e', '--green-light':'#0284c7', '--green-pale':'#dbeafe', '--bg':'#f0f6ff' },

function setTheme(name) {
  const t = THEMES[name];
  if (!t) return;
  const root = document.documentElement;
  Object.entries(t).forEach(([k, v]) => root.style.setProperty(k, v));
  document.querySelectorAll('.theme-dot').forEach(d =>
    d.classList.toggle('active', d.dataset.theme === name)
  );
  try { localStorage.setItem('wdr-theme', name); } catch(e) {}
  document.getElementById('theme-popup').classList.remove('open');
}

function toggleThemePopup(e) {

}
document.addEventListener('click', () => {

});

// ?? 愿???쒖뒪????????????????????????????????????????????
const IRRIG_SPECS = {
  'popup-s': { r:2.5, flow:0.5,  label:'?앹뾽 ?뚰삎' },
  'popup-m': { r:4.0, flow:1.2,  label:'?앹뾽 以묓삎' },
  'rotor':   { r:7.5, flow:3.5,  label:'濡쒗꽣由ы삎' },
};
function updateIrrigType() {
  const v = document.getElementById('irrig-type').value;
  document.getElementById('irrig-drip-inputs').style.display = v === 'drip' ? 'block' : 'none';
}
function calcIrrig() {
  const area    = parseFloat(document.getElementById('irrig-area').value);
  const type    = document.getElementById('irrig-type').value;
  const layout  = document.querySelector('input[name="irrig-layout"]:checked').value;
  if (!area || area <= 0) { alert('?쒓났 硫댁쟻???낅젰?섏꽭??); return; }

  let heads, totalFlow, note;
  if (type === 'drip') {
    const rowSpacing = parseFloat(document.getElementById('irrig-drip-row').value) / 100;
    const colSpacing = parseFloat(document.getElementById('irrig-drip-col').value) / 100;
    if (!rowSpacing || !colSpacing) { alert('諛⑹슱?는룹뿴 媛꾧꺽???낅젰?섏꽭??); return; }
    heads = Math.ceil(area / (rowSpacing * colSpacing));
    totalFlow = heads * 2 / 60;
    const rows = Math.ceil(Math.sqrt(area) / rowSpacing);
    note = '諛⑹슱??媛꾧꺽 ' + (rowSpacing*100).toFixed(0) + 'cm 횞 ??媛꾧꺽 ' + (colSpacing*100).toFixed(0) + 'cm\n?좊웾 2 L/h/媛?湲곗?';
    document.getElementById('irrig-result').classList.add('show');
    document.getElementById('r-irrig-heads').textContent = heads.toLocaleString() + '媛?;
    document.getElementById('r-irrig-zones').textContent = Math.ceil(totalFlow / 15) + '援ъ뿭  (15 L/min/援ъ뿭 湲곗?)';
    document.getElementById('r-irrig-flow').textContent  = (heads * 2).toFixed(0) + ' L/h  (' + totalFlow.toFixed(2) + ' L/min)';
    document.getElementById('r-irrig-pipe').textContent  = (Math.sqrt(area) * 1.3).toFixed(0) + ' m (二쇨? 異붿젙)';
    document.getElementById('r-irrig-note').textContent  = note;
    addHistory('愿???쒖뒪??, '?먯쟻愿??' + heads + '媛? ' + Math.ceil(totalFlow/15) + '援ъ뿭');
    return;
  }
  const spec    = IRRIG_SPECS[type];
  const spacing = layout === 'tri' ? spec.r * 1.15 : spec.r;
  const efficiency = layout === 'tri' ? 0.866 : 1.0;
  heads = Math.ceil(area / (spacing * spacing * efficiency));
  heads = Math.ceil(heads * 1.05);
  totalFlow = heads * spec.flow;
  const headsPerZone = Math.floor(15 / spec.flow);
  const zones = Math.ceil(heads / headsPerZone);
  document.getElementById('irrig-result').classList.add('show');
  document.getElementById('r-irrig-heads').textContent = heads + '媛?;
  document.getElementById('r-irrig-zones').textContent = zones + '援ъ뿭  (' + headsPerZone + '媛?援ъ뿭 湲곗?)';
  document.getElementById('r-irrig-flow').textContent  = totalFlow.toFixed(1) + ' L/min  (援ъ뿭??' + (headsPerZone * spec.flow).toFixed(1) + ' L/min)';
  document.getElementById('r-irrig-pipe').textContent  = (Math.sqrt(area) * 1.4).toFixed(0) + ' m (二쇨? 異붿젙)';
  document.getElementById('r-irrig-note').textContent  =
    spec.label + ' | ?댁닔諛섍꼍 ' + spec.r + 'm | ?ㅻ뱶 媛꾧꺽 ' + spacing.toFixed(1) + 'm\n' +
    (layout === 'tri' ? '?쇨컖??諛곗튂 (?⑥쑉 15%??' : '?뺣갑??諛곗튂') + ' | 5% ?ъ쑀 ?ы븿';
  addHistory('愿???쒖뒪??, spec.label + ' ' + heads + '媛? ' + zones + '援ъ뿭');
}
function resetIrrig() {
  document.getElementById('irrig-area').value = '';
  document.getElementById('irrig-type').value = 'popup-s';
  document.getElementById('irrig-drip-inputs').style.display = 'none';
  document.querySelector('input[name="irrig-layout"][value="square"]').checked = true;
  document.getElementById('irrig-result').classList.remove('show');
}

function calcPave2() {
  const area = parseFloat(document.getElementById('pave2-area').value);

  if (!area || area <= 0) { alert('?ъ옣 硫댁쟻???낅젰?섏꽭??); return; }

  const rows = [];
  let note = '';

  if (type === 'asphalt') {
    const tTop  = parseFloat(document.getElementById('pave2-as-top').value)  / 100;
    const tBase = parseFloat(document.getElementById('pave2-as-base').value) / 100;
    const tSub  = parseFloat(document.getElementById('pave2-as-sub').value)  / 100;
    const dens  = 2.35;
    rows.push(['?쒖링 ?꾩뒪?뷀듃 肄섑겕由ы듃', (area * tTop).toFixed(2) + ' m쨀', (area * tTop * dens).toFixed(2) + ' t']);
    rows.push(['湲곗링 ?꾩뒪?뷀듃 肄섑겕由ы듃', (area * tBase).toFixed(2) + ' m쨀', (area * tBase * dens).toFixed(2) + ' t']);
    rows.push(['蹂댁“湲곗링 ?꾩꽍', (area * tSub).toFixed(2) + ' m쨀', (area * tSub * 1.8).toFixed(2) + ' t']);
    const totalAC = (area * tTop + area * tBase) * dens;
    note = '?꾩뒪?뷀듃 肄섑겕由ы듃 ?⑷퀎: ' + totalAC.toFixed(2) + ' t\n諛??AC=2.35 t/m쨀, ?꾩꽍=1.8 t/m쨀 湲곗?';
  } else if (type === 'concrete') {
    const tSlab = parseFloat(document.getElementById('pave2-con-slab').value) / 100;
    const tSub  = parseFloat(document.getElementById('pave2-con-sub').value)  / 100;
    const volCon = area * tSlab;
    rows.push(['肄섑겕由ы듃 ?щ옒釉?, volCon.toFixed(2) + ' m쨀', Math.ceil(volCon / 6) + ' ?  (6 m쨀/?)']);
    rows.push(['蹂댁“湲곗링 ?꾩꽍', (area * tSub).toFixed(2) + ' m쨀', (area * tSub * 1.8).toFixed(2) + ' t']);
    note = '?덈?肄?6 m쨀/?, 10% ?ъ쑀 ?ы븿 ??' + Math.ceil(volCon * 1.1 / 6) + '? 沅뚯옣';
  } else {
    const blkArea = area * 1.03;
    const tSand = parseFloat(document.getElementById('pave2-blk-sand').value)  / 100;
    const tSub  = parseFloat(document.getElementById('pave2-blk-sub').value)   / 100;
    rows.push(['?명꽣濡쒗궧 釉붾줉', blkArea.toFixed(2) + ' m짼  (3% ?ъ쑀)', '-']);
    rows.push(['紐⑤옒 湲곗링', (area * tSand).toFixed(2) + ' m쨀', (area * tSand * 1.6).toFixed(2) + ' t']);
    rows.push(['蹂댁“湲곗링 ?꾩꽍', (area * tSub).toFixed(2) + ' m쨀', (area * tSub * 1.8).toFixed(2) + ' t']);
    note = '紐⑤옒 諛??1.6 t/m쨀, ?꾩꽍 1.8 t/m쨀 湲곗?';
  }

  let html = '<table class="price-table"><tr><th>??ぉ</th><th>?섎웾</th><th>鍮꾧퀬</th></tr>';
  rows.forEach(r => { html += '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td><td>' + r[2] + '</td></tr>'; });
  html += '</table>';
  document.getElementById('r-pave2-rows').innerHTML = html;
  document.getElementById('r-pave2-note').textContent = note;
  document.getElementById('pave2-result').classList.add('show');
  addHistory('?ъ옣 ?щ즺??, area + ' m짼 ' + {'asphalt':'?꾩뒪?뷀듃','concrete':'肄섑겕由ы듃','block':'釉붾줉'}[type]);
}
function resetPave2() {

function applyPlantFilters() {
  const q      = (document.getElementById('plant-search').value || '').trim().toLowerCase();
  const cat    = document.getElementById('plant-filter-cat').value;
  const env    = document.getElementById('plant-filter-env').value;
  const growth = document.getElementById('plant-filter-growth').value;
  const salt   = document.getElementById('plant-filter-salt').checked;
  const smog   = document.getElementById('plant-filter-smog').checked;
  let res = PLANT_DB;
  if (q)      res = res.filter(p => p.n.includes(q) || p.c.includes(q) || p.env.includes(q) || p.tag.includes(q) || p.ornament.includes(q));
  if (cat)    res = res.filter(p => p.c.includes(cat));
  if (env)    res = res.filter(p => p.env === env);
  if (growth) res = res.filter(p => p.growth === growth);
  if (salt)   res = res.filter(p => p.salt);
  if (smog)   res = res.filter(p => p.smog);
  renderPlantList(res);
}
function searchPlants()       { applyPlantFilters(); }
function filterPlants(cat)    { document.getElementById('plant-filter-cat').value = cat; applyPlantFilters(); }

function linkToCalc(type, rDef, name) {

  setTimeout(() => {

    el.focus();
  }, 200);
}

const SS = 'wdr2-';
function ssSave(el) {
  try {
    if (el.type === 'radio') {
      if (el.checked) sessionStorage.setItem(SS + 'r-' + el.name, el.value);
    } else {
      sessionStorage.setItem(SS + el.id, el.value);
    }
  } catch(e) {}
}

function ssRestore() {
  try {
    document.querySelectorAll('input[id]:not([type=radio]):not([type=file]):not([type=checkbox]), select[id]')
      .forEach(el => {
        const v = sessionStorage.getItem(SS + el.id);
        if (v !== null) el.value = v;
      });
    const rNames = new Set();
    document.querySelectorAll('input[type=radio]').forEach(radio => rNames.add(radio.name));
    rNames.forEach(name => {
      const v = sessionStorage.getItem(SS + 'r-' + name);
      if (v !== null) {
        const radio = document.querySelector('input[type=radio][name="' + name + '"][value="' + v + '"]');
        if (radio) radio.checked = true;
      }
    });
    const ms = sessionStorage.getItem(SS + 'matItems');
    if (ms) {
      const arr = JSON.parse(ms);
      if (Array.isArray(arr) && arr.length) { matItems.length = 0; arr.forEach(i => matItems.push(i)); renderMatItems(); }
    }
  } catch(e) {}
  try {
    const ball = document.querySelector('input[name="tree-ball"]:checked');
    if (ball) document.getElementById('root-method-wrap').style.display = ball.value === 'yes' ? 'block' : 'none';
    const stripType = document.querySelector('input[name="grass-type"]:checked');
    if (stripType) document.getElementById('strip-options').style.display = stripType.value === 'strip' ? 'block' : 'none';
    updateIrrigType(); updatePave2Type(); updateLaborMode();
  } catch(e) {}
}

function ssSaveMatItems() {
  try { sessionStorage.setItem(SS + 'matItems', JSON.stringify(matItems)); } catch(e) {}
}

    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  const scrollBtn = document.getElementById('scroll-top-btn');

  }, { passive: true });

  applyPlantFilters();

  document.querySelectorAll('input[id]:not([type=radio]):not([type=file]):not([type=checkbox]), select[id]')
    .forEach(el => {
      el.addEventListener('change', () => ssSave(el));
      if (el.tagName === 'INPUT') el.addEventListener('input', () => ssSave(el));
    });
  document.querySelectorAll('input[type=radio]').forEach(el => el.addEventListener('change', () => ssSave(el)));

  document.querySelectorAll('.result-box .result-title').forEach(titleEl => {
    const btn = document.createElement('button');
    btn.className = 'result-copy-btn';
    btn.textContent = '?뱥 蹂듭궗';
    btn.onclick = function() {
      const box = this.closest('.result-box');
      const rows = [];
      box.querySelectorAll('.result-row').forEach(row => {
        if (row.style.display === 'none') return;
        const lbl = row.querySelector('.result-label');
        const val = row.querySelector('.result-value');
        if (lbl && val) rows.push(lbl.textContent.trim() + ': ' + val.textContent.trim());
      });
      const note = box.querySelector('.result-note');
      if (note && note.textContent.trim()) rows.push('\n' + note.textContent.trim());
      const text = rows.join('\n');
      const self = this;
      const done = () => { self.textContent = '??蹂듭궗??; setTimeout(() => { self.textContent = '?뱥 蹂듭궗'; }, 1800); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
      } else { fallbackCopy(text, done); }
    };
    titleEl.appendChild(btn);
  });
});


function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

  btn.classList.add('active');
}

function calcTree() {
  const d   = parseFloat(document.getElementById('tree-d').value);
  const h   = parseFloat(document.getElementById('tree-height').value);
  const W0  = parseFloat(document.getElementById('tree-u-class').value);
  const P   = parseFloat(document.querySelector('input[name="tree-plant"]:checked').value);
  const hasBall    = document.querySelector('input[name="tree-ball"]:checked').value === 'yes';
  const rootMethod = document.querySelector('input[name="tree-root-method"]:checked').value;

  if (!d || d <= 0) { alert('?됯퀬吏곴꼍???낅젰?댁＜?몄슂'); return; }
  if (!h || h <= 0) { alert('?섍퀬瑜??낅젰?댁＜?몄슂');     return; }

  // 吏?곷? 以묐웾: W1 = 0.5 횞 ? 횞 (D/2)짼 횞 H 횞 W0 횞 (1+P)
  const D = d / 100;  // cm ??m
  const aboveWeight = 0.5 * Math.PI * Math.pow(D / 2, 2) * h * W0 * (1 + P);

  // 肉뚮━遺 以묐웾: 洹쇱썝吏곴꼍 R ??D/0.8, 肉뚮━遺?吏곴꼍 = R횞4, r = 肉뚮━遺?諛섏?由?m)
  let belowWeight = 0, ballD = 0, ballVol = 0, ballTypeName = '';
  if (hasBall) {
    const R_est = d / 0.8;                 // 洹쇱썝吏곴꼍 異붿젙 (cm)
    ballD       = R_est * 4;               // 肉뚮━遺?吏곴꼍 (cm)
    const r     = ballD / 2 / 100;         // 肉뚮━遺?諛섏?由?(m)
    const volMap  = { clam: Math.PI, normal: 3.6, plate: 4 };
    const nameMap = { clam: '議곌컻遺?, normal: '蹂댄넻遺?, plate: '?묒떆遺? };
    ballVol      = volMap[rootMethod] * Math.pow(r, 3);
    ballTypeName = nameMap[rootMethod];
    belowWeight  = ballVol * 1300;
  }

  const totalWeight = aboveWeight + belowWeight;
  const R_est = d / 0.8;  // ?λ퉬 異붿쿇??洹쇱썝吏곴꼍 異붿젙

  let equipment = '';
  if      (R_est <= 7)  equipment = '<span class="equipment-tag">?몃젰 ?묒뾽 媛??/span>';
  else if (R_est <= 10) equipment = '<span class="equipment-tag">2???몃젰 ?묒뾽</span>';
  else if (R_est <= 17) equipment = '<span class="equipment-tag">3??援댁궘湲?/span>';
  else if (R_est <= 25) equipment = '<span class="equipment-tag">5??援댁궘湲?(3BH)</span>';
  else if (R_est <= 35) equipment = '<span class="equipment-tag">06W 援댁궘湲?/span>';
  else                  equipment = '<span class="equipment-tag">?щ젅???꾩슂</span>';

  document.getElementById('tree-result').classList.add('show');
  document.getElementById('r-dbh-calc').textContent    = d.toFixed(1) + ' cm';
  document.getElementById('r-above').textContent       = aboveWeight.toFixed(1) + ' kg';
  document.getElementById('r-ball-d').textContent      = hasBall ? ballD.toFixed(0) + ' cm' : '-';
  document.getElementById('r-below').textContent       = hasBall
    ? belowWeight.toFixed(1) + ' kg  (' + ballTypeName + ', ' + ballVol.toFixed(3) + ' ??'
    : '?대떦?놁쓬 (?섍렐)';
  document.getElementById('r-total-weight').textContent = totalWeight.toFixed(1) + ' kg';
  document.getElementById('r-equipment').innerHTML     = equipment;
  document.getElementById('r-tree-note').textContent   =
    'W0=' + W0.toLocaleString() + ' kg/?? P=' + P +
    (hasBall ? '\n肉뚮━遺?r=' + (ballD/2).toFixed(0) + 'cm, K=1,300 kg/?? : '') +
    '\n2013 ?쒓뎅議곌꼍?숉쉶 ?ㅺ퀎湲곗?\n??李멸퀬???섏튂?낅땲?? ?꾩옣 議곌굔???곕씪 ?щ씪吏????덉뒿?덈떎.';

  renderTreeWeightSVG(aboveWeight, belowWeight, totalWeight, hasBall, h, d / 0.8);
}

function calcMulch() {

  if (unit === 'pyeong') area = area * 3.3058;

  const vol = area * (depth / 100);
  const matInfo = {
    bark:   { name: '?곕뱶移?(諛뷀겕)', density: 350,  bagVol: 0.05,  bagUnit: '50L ?щ?' },
    masat:  { name: '留덉궗??,        density: 1600, bagVol: 0.025, bagUnit: '40kg ?щ?' },

    gravel: { name: '?먭컝 (?꾩꽍)',   density: 1800, bagVol: 0.025, bagUnit: '45kg ?щ?' },
    soil:   { name: '諛곗뼇??,        density: 700,  bagVol: 0.05,  bagUnit: '50L ?щ?' },
  };

  const mat = matInfo[type];
  const weight = vol * mat.density;
  const bags = Math.ceil(vol / mat.bagVol);

  document.getElementById('mulch-result').classList.add('show');
  document.getElementById('r-mulch-vol').textContent = vol.toFixed(2) + ' ??;
  document.getElementById('r-mulch-weight').textContent = (weight/1000).toFixed(1) + ' ??(' + weight.toFixed(0) + ' kg)';
  document.getElementById('r-mulch-bag').textContent = bags.toLocaleString() + '媛?(' + mat.bagUnit + ')';

    mat.name + ' 湲곗?\n硫댁쟻 ' + area.toFixed(1) + '??횞 ?먭퍡 ' + depth + 'cm\n???ъ쑀??5% 異붽? 沅뚯옣';
}

function calcPlant() {
  let area = parseFloat(document.getElementById('plant-area').value);
  const unit = document.getElementById('plant-unit').value;
  const sx = parseFloat(document.getElementById('plant-spacing-x').value);
  const sy = parseFloat(document.getElementById('plant-spacing-y').value);
  const method = document.querySelector('input[name="plant-method"]:checked').value;
  const margin = parseFloat(document.querySelector('input[name="plant-margin"]:checked').value);
  if (!area || area <= 0) { alert('硫댁쟻???낅젰?댁＜?몄슂'); return; }
  if (!sx || sx <= 0 || !sy || sy <= 0) { alert('?앹옱 媛꾧꺽???낅젰?댁＜?몄슂'); return; }
  if (unit === 'pyeong') area = area * 3.3058;
  let unitArea = sx * sy;
  if (method === 'triangle') unitArea *= 0.866;
  const baseQty = Math.ceil(area / unitArea);
  const totalQty = margin > 0 ? Math.ceil(baseQty * (1 + margin / 100)) : baseQty;
  document.getElementById('plant-result').classList.add('show');

const photo = {
  img: null, mode: 'ref',
  refPts: [], pxPerMeter: 0,
  curPts: [], saved: [], count: 0,
  canvasListened: false,
  hoverPt: null,
  drag: null,
  pointerStart: null,
  moved: false,
};

function loadPhotoFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const img = new Image();
  const blobUrl = URL.createObjectURL(file);
  img.onerror = () => {
    URL.revokeObjectURL(blobUrl);
    alert('?대?吏瑜?遺덈윭?????놁뒿?덈떎. ?ㅻⅨ ?뚯씪???좏깮?댁＜?몄슂.');
  };
  img.onload = () => {
    URL.revokeObjectURL(blobUrl);
    photo.img = img;
    photo.refPts = []; photo.pxPerMeter = 0;
    photo.curPts = []; photo.saved = []; photo.count = 0;
    document.getElementById('photo-upload-area').style.display  = 'none';
    document.getElementById('photo-canvas-wrap').style.display  = 'block';
    document.getElementById('photo-toolbar').style.display      = 'block';
    document.getElementById('photo-results').style.display      = 'block';
    document.getElementById('photo-ref-status').style.display   = 'none';
    document.getElementById('photo-measure-list').innerHTML     = '';
    renderPhotoCanvas();
    if (!photo.canvasListened) {
      const c = document.getElementById('photo-canvas');
      c.addEventListener('touchstart', onPhotoTouchStart, { passive: false });
      c.addEventListener('touchmove',  onPhotoTouchMove,  { passive: false });
      c.addEventListener('touchend',   onPhotoTouchEnd,   { passive: false });
      c.addEventListener('mousedown',  onPhotoMouseDown);
      c.addEventListener('mousemove',  onPhotoMouseMove);
      c.addEventListener('mouseup',    onPhotoMouseUp);
      c.addEventListener('mouseleave', () => { photo.hoverPt = null; redrawPhoto(); });
      window.addEventListener('resize', () => { if (photo.img) renderPhotoCanvas(); });
      photo.canvasListened = true;
    }
    setPhotoMode('ref');
  };
  img.src = blobUrl;
}

function renderPhotoCanvas() {
  const canvas = document.getElementById('photo-canvas');
  const wrap   = document.getElementById('photo-canvas-wrap');
  const w = wrap.clientWidth || 360;
  canvas.width  = w;
  canvas.height = Math.round(w * photo.img.naturalHeight / photo.img.naturalWidth);
  photo.scale   = w / photo.img.naturalWidth;
  redrawPhoto();
}

function redrawPhoto() {
  const canvas = document.getElementById('photo-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(photo.img, 0, 0, canvas.width, canvas.height);

  // 湲곗???(?뱀깋)
  if (photo.refPts.length >= 1) photoDot(ctx, photo.refPts[0], '#22c55e');
  if (photo.refPts.length === 2) photoLine(ctx, photo.refPts[0], photo.refPts[1], '#22c55e', '湲곗?');

  // ??λ맂 痢≪젙媛?  photo.saved.forEach(m => {
    if (m.type === 'dist') photoLine(ctx, m.pts[0], m.pts[1], '#f97316', m.label);
    else                   photoPoly(ctx, m.pts, '#f97316', m.label);
  });

  // ?꾩옱 吏꾪뻾 以묒씤 ??  const col = photo.mode === 'ref' ? '#22c55e' : '#f97316';
  photo.curPts.forEach(p => photoDot(ctx, p, col));
  if (photo.curPts.length >= 2 && photo.mode !== 'area')
    photoLine(ctx, photo.curPts[0], photo.curPts[1], col, '');
  if (photo.mode === 'area' && photo.curPts.length >= 2)
    photoPoly(ctx, photo.curPts, col, '');

  // ?ㅼ떆媛???誘몃━蹂닿린
  if (photo.hoverPt) {
    let previewFrom = null;
    if (photo.mode === 'ref'  && photo.refPts.length === 1) previewFrom = photo.refPts[0];
    if (photo.mode === 'dist' && photo.curPts.length === 1) previewFrom = photo.curPts[0];
    if (photo.mode === 'area' && photo.curPts.length >= 1)  previewFrom = photo.curPts[photo.curPts.length - 1];
    if (previewFrom) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(previewFrom.x, previewFrom.y);
      ctx.lineTo(photo.hoverPt.x, photo.hoverPt.y);
      ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.55;
      ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
    drawMagnifier(ctx, canvas, photo.hoverPt);
  }
}

function photoDot(ctx, p, col) {
  ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
  ctx.fillStyle = col; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
}
function photoLine(ctx, a, b, col, label) {
  photoDot(ctx, a, col); photoDot(ctx, b, col);
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = col; ctx.lineWidth = 2.5;
  ctx.setLineDash([8,4]); ctx.stroke(); ctx.setLineDash([]);
  if (label) {
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    ctx.font = 'bold 13px sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = col; ctx.strokeText(label, mx+5, my-5);
    ctx.fillStyle = '#fff'; ctx.fillText(label, mx+5, my-5);
  }
}
function photoPoly(ctx, pts, col, label) {
  if (pts.length < 2) return;
  pts.forEach(p => photoDot(ctx, p, col));
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  if (pts.length > 2) ctx.closePath();
  ctx.strokeStyle = col; ctx.lineWidth = 2.5;
  ctx.setLineDash([8,4]); ctx.stroke(); ctx.setLineDash([]);
  if (pts.length > 2) { ctx.fillStyle = 'rgba(249,115,22,0.18)'; ctx.fill(); }
  if (label && pts.length > 0) {
    const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
    const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;
    ctx.font = 'bold 13px sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = col; ctx.strokeText(label, cx, cy);
    ctx.fillStyle = '#fff'; ctx.fillText(label, cx, cy);
  }
}

function getPhotoPoint(e) {
  const canvas = document.getElementById('photo-canvas');
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  let cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX; cy = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
  } else { cx = e.clientX; cy = e.clientY; }
  return { x: (cx - rect.left)*sx, y: (cy - rect.top)*sy };
}

function findNearPoint(pt) {
  const canvas = document.getElementById('photo-canvas');
  const rect = canvas.getBoundingClientRect();
  const threshold = 28 * (canvas.width / rect.width);
  const check = (arr, src) => {
    for (let i = 0; i < arr.length; i++) {
      if (Math.hypot(arr[i].x - pt.x, arr[i].y - pt.y) < threshold) return { src, idx: i };
    }
    return null;
  };
  return check(photo.refPts, 'ref') || check(photo.curPts, 'cur');
}

function placePhotoPoint(pt) {
  if (photo.mode === 'ref') {
    photo.refPts.push(pt);
    if (photo.refPts.length > 2) photo.refPts = [pt];
  } else if (photo.mode === 'dist') {
    photo.curPts.push(pt);
    if (photo.curPts.length === 2) saveDistMeasure();
  } else if (photo.mode === 'area') {
    photo.curPts.push(pt);
  }
}

function finalizeDrag() {
  if (photo.drag && photo.drag.src === 'ref' && photo.pxPerMeter > 0) {
    photo.pxPerMeter = 0;
    const s = document.getElementById('photo-ref-status');
    s.style.display = 'block';
    s.textContent = '??湲곗????대룞????湲몄씠瑜??ㅼ떆 ?낅젰?섍퀬 ?ㅼ젙?섏꽭??;
    setPhotoMode('ref');
  }
}

function onPhotoTouchStart(e) {
  if (!photo.img) return;
  e.preventDefault();
  const pt = getPhotoPoint(e);
  photo.hoverPt = pt; photo.pointerStart = pt; photo.moved = false;
  photo.drag = findNearPoint(pt);
  redrawPhoto();
}

function onPhotoTouchMove(e) {
  if (!photo.img) return;
  e.preventDefault();
  const pt = getPhotoPoint(e);
  photo.hoverPt = pt;
  if (photo.pointerStart && Math.hypot(pt.x - photo.pointerStart.x, pt.y - photo.pointerStart.y) > 8) photo.moved = true;
  if (photo.drag && photo.moved) {
    const arr = photo.drag.src === 'ref' ? photo.refPts : photo.curPts;
    arr[photo.drag.idx] = pt;
  }
  redrawPhoto();
}

function onPhotoTouchEnd(e) {
  if (!photo.img) return;
  e.preventDefault();
  if (photo.drag && photo.moved) { finalizeDrag(); }
  else if (!photo.moved)         { placePhotoPoint(getPhotoPoint(e)); }
  photo.drag = null; photo.hoverPt = null; photo.pointerStart = null; photo.moved = false;
  redrawPhoto();
}

function onPhotoMouseDown(e) {
  if (!photo.img) return;
  photo.pointerStart = getPhotoPoint(e); photo.moved = false;
  photo.drag = findNearPoint(photo.pointerStart);
}

function onPhotoMouseMove(e) {
  if (!photo.img) return;
  const pt = getPhotoPoint(e);
  photo.hoverPt = pt;
  if (photo.pointerStart) {
    if (Math.hypot(pt.x - photo.pointerStart.x, pt.y - photo.pointerStart.y) > 5) photo.moved = true;
    if (photo.drag && photo.moved) {
      const arr = photo.drag.src === 'ref' ? photo.refPts : photo.curPts;
      arr[photo.drag.idx] = pt;
    }
  }
  redrawPhoto();
}

function onPhotoMouseUp(e) {
  if (!photo.img) return;
  if (photo.drag && photo.moved) { finalizeDrag(); }
  else if (!photo.moved)         { placePhotoPoint(getPhotoPoint(e)); }
  photo.drag = null; photo.pointerStart = null; photo.moved = false;
  redrawPhoto();
}

function drawMagnifier(ctx, canvas, pt) {
  const magR = Math.max(48, Math.round(canvas.width * 0.15));
  const zoom = 3;
  let magX = Math.max(magR + 6, Math.min(canvas.width - magR - 6, pt.x));
  let magY = pt.y - magR - 24;
  if (magY < magR + 6) magY = pt.y + magR + 24;
  const srcX = pt.x - magR / zoom, srcY = pt.y - magR / zoom;
  const srcW = (magR * 2) / zoom, srcH = (magR * 2) / zoom;
  ctx.save();
  ctx.beginPath(); ctx.arc(magX, magY, magR + 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
  ctx.beginPath(); ctx.arc(magX, magY, magR, 0, Math.PI * 2); ctx.clip();
  ctx.drawImage(canvas, srcX, srcY, srcW, srcH, magX - magR, magY - magR, magR * 2, magR * 2);
  ctx.restore();
  ctx.beginPath(); ctx.arc(magX, magY, magR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2.5; ctx.stroke();
  const ch = 13;
  ctx.beginPath();
  ctx.moveTo(magX - ch, magY); ctx.lineTo(magX + ch, magY);
  ctx.moveTo(magX, magY - ch); ctx.lineTo(magX, magY + ch);
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5; ctx.stroke();
}

function setPhotoReference() {
  if (photo.refPts.length !== 2) { alert('?ъ쭊?먯꽌 ???먯쓣 癒쇱? ?대┃?댁＜?몄슂'); return; }
  const val  = parseFloat(document.getElementById('photo-ref-value').value);

  if (!val || val <= 0) { alert('?ㅼ젣 湲몄씠瑜??낅젰?댁＜?몄슂'); return; }
  const meters = val * unit;
  const dx = photo.refPts[1].x - photo.refPts[0].x;
  const dy = photo.refPts[1].y - photo.refPts[0].y;
  const px = Math.sqrt(dx*dx + dy*dy);
  photo.pxPerMeter = px / meters;
  const unitLabel = unit===1 ? 'm' : unit===0.01 ? 'cm' : 'mm';
  const statusEl = document.getElementById('photo-ref-status');

  statusEl.textContent = '??湲곗? ?ㅼ젙 ?꾨즺 ??' + val + unitLabel + ' = ' + Math.round(px) + 'px 쨌 1px ??' + (1000/photo.pxPerMeter).toFixed(1) + 'mm';
  setPhotoMode('dist');
}

function saveDistMeasure() {
  if (photo.pxPerMeter === 0) { alert('癒쇱? 湲곗????ㅼ젙?댁＜?몄슂'); photo.curPts=[]; return; }
  const dx = photo.curPts[1].x - photo.curPts[0].x;
  const dy = photo.curPts[1].y - photo.curPts[0].y;
  const m  = Math.sqrt(dx*dx + dy*dy) / photo.pxPerMeter;
  photo.count++;
  const label = m >= 1 ? m.toFixed(2)+'m' : (m*100).toFixed(1)+'cm';
  photo.saved.push({ type:'dist', pts:[...photo.curPts], label, value:m });
  photo.curPts = [];
  updatePhotoList();
}

function finishAreaMeasure() {
  if (photo.curPts.length < 3) { alert('3???댁긽 ?대┃?댁＜?몄슂'); return; }
  if (photo.pxPerMeter === 0)  { alert('癒쇱? 湲곗????ㅼ젙?댁＜?몄슂'); return; }
  const pts = photo.curPts;
  let area = 0;
  for (let i=0; i<pts.length; i++) {
    const j = (i+1) % pts.length;
    area += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
  }
  const sqm = Math.abs(area) / 2 / (photo.pxPerMeter * photo.pxPerMeter);
  photo.count++;
  const label = sqm.toFixed(2)+'??;
  photo.saved.push({ type:'area', pts:[...photo.curPts], label, value:sqm });
  photo.curPts = [];
  updatePhotoList();
  redrawPhoto();
}

function calcPit() {
  const R     = parseFloat(document.getElementById('pit-r').value);
  const count = parseFloat(document.getElementById('pit-count').value);
  const topsoilPct  = parseFloat(document.querySelector('input[name="pit-topsoil"]:checked').value);
  const compostPct  = parseFloat(document.querySelector('input[name="pit-compost"]:checked').value);
  if (!R || R <= 0)         { alert('洹쇱썝吏곴꼍???낅젰?댁＜?몄슂'); return; }
  if (!count || count <= 0) { alert('?섎ぉ ?섎웾???낅젰?댁＜?몄슂'); return; }
  // 肉뚮━遺?吏곴꼍 D = R횞4 (cm?뭢)
  const ballD  = R * 4 / 100;
  // 援щ뜦??吏곴꼍 = 肉뚮━遺?횞 1.5, 源딆씠 = 肉뚮━遺??믪씠(?뉲횞0.5) 횞 1.2
  const pitD   = ballD * 1.5;
  const pitH   = ballD * 0.5 * 1.2;
  const volOne = Math.PI * Math.pow(pitD / 2, 2) * pitH;
  const volTotal   = volOne * count;
  const volTopsoil = volTotal * topsoilPct / 100;
  const volCompost = volTotal * compostPct / 100;
  document.getElementById('pit-result').classList.add('show');
  document.getElementById('r-pit-size').textContent    = '?' + (pitD*100).toFixed(0) + 'cm 횞 源딆씠 ' + (pitH*100).toFixed(0) + 'cm';
  document.getElementById('r-pit-one').textContent     = volOne.toFixed(3) + ' ??;
  document.getElementById('r-pit-total').textContent   = volTotal.toFixed(3) + ' ??(' + count + '二?';
  document.getElementById('r-pit-topsoil').textContent = volTopsoil.toFixed(3) + ' ?? (' + topsoilPct + '%)';
  document.getElementById('r-pit-compost').textContent = compostPct > 0
    ? volCompost.toFixed(3) + ' ?? (' + compostPct + '%)'
    : '?대떦?놁쓬';
  document.getElementById('r-pit-note').textContent =
    '肉뚮━遺?吏곴꼍 ' + (ballD*100).toFixed(0) + 'cm (R횞4)\n' +
    '援щ뜦??= 肉뚮━遺꽸?.5 / 源딆씠 = 肉뚮━遺꾨넂?늘?.2\n??遺?쏀넗??媛앺넗???鍮?鍮꾩쑉濡?怨꾩궛';
}

// ?? 怨듭궗 D-day ??????????????????????????????????????????
function calcDday() {
  const startVal = document.getElementById('dday-start').value;
  const endVal   = document.getElementById('dday-end').value;
  if (!startVal) { alert('李⑷났?쇱쓣 ?낅젰?댁＜?몄슂'); return; }
  if (!endVal)   { alert('以怨듭씪???낅젰?댁＜?몄슂'); return; }
  const start = new Date(startVal);
  const end   = new Date(endVal);
  const today = new Date(); today.setHours(0,0,0,0);
  if (end <= start) { alert('以怨듭씪? 李⑷났???댄썑?ъ빞 ?⑸땲??); return; }
  const MS = 24*60*60*1000;
  const total   = Math.round((end   - start) / MS);
  const elapsed = Math.round((today - start) / MS);
  const remain  = Math.round((end   - today) / MS);
  const pct     = Math.min(100, Math.max(0, elapsed / total * 100));
  const filled  = Math.round(pct / 5);
  const bar     = '??.repeat(filled) + '??.repeat(20 - filled);
  document.getElementById('dday-result').classList.add('show');
  document.getElementById('r-dday-total').textContent   = total + '??;
  document.getElementById('r-dday-elapsed').textContent = elapsed < 0 ? '李⑷났 ??(' + Math.abs(elapsed) + '????李⑷났)' : elapsed + '??;
  document.getElementById('r-dday-remain').textContent  =
    remain < 0 ? '以怨?D+' + Math.abs(remain) + ' (湲곌컙 珥덇낵)' :
    remain === 0 ? 'D-0 (?ㅻ뒛??以怨듭씪)' : 'D-' + remain;
  document.getElementById('r-dday-pct').textContent     = pct.toFixed(1) + '%';
  document.getElementById('r-dday-note').textContent    =
    bar + '  ' + pct.toFixed(0) + '%\n' + startVal + '  ~  ' + endVal +
    (remain < 0 ? '\n??以怨?湲고븳 ' + Math.abs(remain) + '??珥덇낵' :
     remain === 0 ? '\n?ㅻ뒛??以怨듭씪?낅땲?? : '');
}
function resetDday() {
  document.getElementById('dday-start').value = '';
  document.getElementById('dday-end').value   = '';
  document.getElementById('dday-result').classList.remove('show');
}
